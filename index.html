<script src="https://cdn.jsdelivr.net/gh/openai/gpt-js/gpt.min.js"></script>
<script>
let chapterText = "";

// Load Chapter 1
fetch("chapter1.txt")
  .then(response => response.text())
  .then(text => { chapterText = text; });

async function ask() {
    let question = document.getElementById("question").value;
    let chat = document.getElementById("chat");
    if (!question) return;

    chat.innerHTML += "<p><b>You:</b> " + question + "</p>";
    document.getElementById("question").value = "";

    // Call GPT-5.4 Mini
    const answer = await GPT.generate({
        model: "gpt-5.4-mini",
        prompt: `You are Revelation AI. Use the following chapter text to answer the question clearly and simply.\n\nChapter 1:\n${chapterText}\n\nQuestion: ${question}\nAnswer:`,
        temperature: 0.3,
        max_tokens: 300
    });

    chat.innerHTML += "<p><b>Revelation AI:</b> " + answer.text + "</p>";
    chat.scrollTop = chat.scrollHeight;
}
</script>
